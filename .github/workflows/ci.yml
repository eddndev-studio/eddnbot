name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: eddnbot
          POSTGRES_PASSWORD: eddnbot
          POSTGRES_DB: eddnbot_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U eddnbot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm --filter @eddnbot/api exec tsc --noEmit

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://eddnbot:eddnbot@localhost:5433/eddnbot_test
          REDIS_URL: redis://localhost:6380
          ADMIN_SECRET: ci-admin-secret-that-is-at-least-32-chars-long
