name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Copy .env from host
        run: cp /opt/eddnbot/.env $GITHUB_WORKSPACE/tooling/docker/.env

      - name: Deploy with Docker Compose
        working-directory: tooling/docker
        run: |
          docker compose -f docker-compose.prod.yml --env-file .env up -d --build --remove-orphans

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3001/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          docker logs eddnbot-api --tail 50
          exit 1

      - name: Cleanup old images
        run: docker image prune -f
