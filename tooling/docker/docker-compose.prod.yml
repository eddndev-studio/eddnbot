services:
  postgres:
    image: postgres:17-alpine
    container_name: eddnbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eddnbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: eddnbot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eddnbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eddnbot-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ../../
      dockerfile: Dockerfile
      target: migrate
    container_name: eddnbot-migrate
    environment:
      DATABASE_URL: postgresql://eddnbot:${POSTGRES_PASSWORD}@postgres:5432/eddnbot
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../../
      dockerfile: Dockerfile
      target: api
    container_name: eddnbot-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      DATABASE_URL: postgresql://eddnbot:${POSTGRES_PASSWORD}@postgres:5432/eddnbot
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      HOST: "0.0.0.0"
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      ADMIN_SECRET: ${ADMIN_SECRET}
      MEDIA_STORAGE_PATH: /data/media
    volumes:
      - media-data:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ../../
      dockerfile: Dockerfile
      target: web
    container_name: eddnbot-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  media-data:
