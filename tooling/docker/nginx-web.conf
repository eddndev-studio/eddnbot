server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        proxy_pass http://api:3001;
    }
    location /tenants {
        proxy_pass http://api:3001;
    }
    location /ai {
        proxy_pass http://api:3001;
    }
    location /whatsapp {
        proxy_pass http://api:3001;
    }
    location /quotas {
        proxy_pass http://api:3001;
    }
    location /usage {
        proxy_pass http://api:3001;
    }
    location /api-keys {
        proxy_pass http://api:3001;
    }
}
