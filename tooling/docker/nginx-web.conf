server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin API routes (proxied to backend)
    location /admin/auth {
        proxy_pass http://api:3001;
    }
    location /admin/tenants {
        proxy_pass http://api:3001;
    }
    location /admin/overview {
        proxy_pass http://api:3001;
    }
    location /admin/usage {
        proxy_pass http://api:3001;
    }
    location /health {
        proxy_pass http://api:3001;
    }
    location /ai {
        proxy_pass http://api:3001;
    }
    location /whatsapp {
        proxy_pass http://api:3001;
    }
    location /quotas {
        proxy_pass http://api:3001;
    }
    location /usage {
        proxy_pass http://api:3001;
    }
}
